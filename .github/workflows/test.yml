name: test
on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ci:
    # V5-D: consume the shared reusable CI workflow (kevinkda/mcp-ci-templates).
    # secrets: inherit is required so the gitleaks step receives GITHUB_TOKEN.
    #
    # NOTE: the read-only security boundary (Layer 4) is intentionally kept in
    # the standalone security-grep.yml workflow rather than routed through the
    # reusable workflow's optional security-grep job. This preserves the exact
    # existing boundary contract (grep + Layer 1 _READ_ONLY_METHODS assertion)
    # with zero behavioural change, so run-security-grep stays false here.
    uses: kevinkda/mcp-ci-templates/.github/workflows/reusable-mcp-ci.yml@main
    secrets: inherit  # pragma: allowlist secret
    with:
      os-matrix: '["ubuntu-latest", "macos-latest"]'
      python-versions: '["3.11", "3.12"]'
