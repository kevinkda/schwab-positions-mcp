# Pre-commit hooks for schwab-positions-mcp.
# Plan §3.3.4 — gitleaks + detect-secrets + ruff + mypy.
#
# Bootstrap (run once after `git clone`):
#     uv sync --extra dev
#     uv run pre-commit install
#
# Design notes (2026-05 hardening):
#   * ruff / ruff-format / mypy are wired as `repo: local` and shell out to
#     `uv run`.  This pins the tool version to whatever is locked in
#     `pyproject.toml` / `uv.lock`, so the hook can never disagree with the
#     tool that developers and CI run directly.  It also avoids pre-commit
#     having to download per-rev tool environments from PyPI / GitHub, which
#     fails on locked-down corporate networks (e.g. Amazon dev-dsk) where
#     `pip` and `git clone` over HTTPS hit `CERTIFICATE_VERIFY_FAILED`.
#   * gitleaks is gated to `stages: [manual]` for the same reason: the
#     upstream `gitleaks/gitleaks` repo ships a binary download that is not
#     reachable from CDD environments.  Run it from a machine with public
#     internet via:
#         pre-commit run --hook-stage manual gitleaks --all-files
#     `detect-secrets` is the always-on baseline-aware secret scanner that
#     runs on every commit.

repos:
  # ---------------------------------------------------------------------
  # Generic hygiene
  # ---------------------------------------------------------------------
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-json
        exclude: ^tests/fixtures/.*\.json$  # fixtures may have intentional edge cases
      - id: check-added-large-files
        args: ["--maxkb=512"]
      - id: detect-private-key
      - id: check-merge-conflict
      - id: mixed-line-ending
        args: ["--fix=lf"]

  # ---------------------------------------------------------------------
  # Secret scanning — gitleaks (manual stage only; needs public internet)
  # ---------------------------------------------------------------------
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks
        stages: [manual]

  # ---------------------------------------------------------------------
  # Secret scanning — detect-secrets (baseline-aware, always on)
  # ---------------------------------------------------------------------
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args:
          - "--baseline"
          - ".secrets.baseline"
        exclude: |
          (?x)^(
              uv\.lock|
              \.secrets\.baseline|
              tests/fixtures/.*\.json
          )$

  # ---------------------------------------------------------------------
  # Lint + format — ruff (driven by the project venv via `uv run` so the
  # hook version is always identical to the one used by developers / CI).
  # ---------------------------------------------------------------------
  - repo: local
    hooks:
      - id: ruff
        name: ruff (lint, --fix)
        entry: uv run ruff check --fix --force-exclude
        language: system
        types_or: [python, pyi]
        require_serial: true

      - id: ruff-format
        name: ruff-format
        entry: uv run ruff format --force-exclude
        language: system
        types_or: [python, pyi]
        require_serial: true

  # ---------------------------------------------------------------------
  # Type check — mypy (only on src/, tests are looser).
  # Same rationale as ruff: drive from the project venv via `uv run` so
  # that mypy sees the real project dependencies (pydantic, mcp, httpx,
  # schwab-py, …) without pre-commit having to rebuild a parallel env.
  # ---------------------------------------------------------------------
  - repo: local
    hooks:
      - id: mypy
        name: mypy (--strict on src/)
        entry: uv run mypy --strict --ignore-missing-imports
        language: system
        types: [python]
        files: ^src/
        require_serial: true
        pass_filenames: false
        args: ["src/"]

  # ---------------------------------------------------------------------
  # Markdown lint — markdownlint-cli2 via npx.  Wired as `repo: local` so
  # pre-commit does not have to clone https://github.com/DavidAnson/markdownlint-cli2
  # at hook-install time (the same offline-network constraint that drives
  # ruff/mypy/detect-secrets above).  npx caches the package on first run
  # against the existing system Node toolchain.
  # ---------------------------------------------------------------------
  - repo: local
    hooks:
      - id: markdownlint-cli2
        name: markdownlint-cli2 (--fix)
        entry: npx --yes markdownlint-cli2 --fix
        language: system
        types: [markdown]
        require_serial: true
